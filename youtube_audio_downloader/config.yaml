name: YouTube Audio Downloader
version: "0.1.0"
slug: youtube_audio_downloader
description: Download authorized YouTube audio as tagged MP3 files
url: https://github.com/Misiu/yt_dlp-addon
image: ghcr.io/misiu/youtube-audio-downloader
arch:
  - amd64
  - aarch64
init: false
ingress: true
ingress_stream: true
panel_icon: mdi:music-box-multiple
panel_title: YouTube Audio
stage: experimental
map:
  - type: media
    read_only: false
options:
  output_directory: youtube_audio
  mp3_quality: 320
  history_limit: 100
  overwrite_existing: false
schema:
  output_directory: str(1,200)
  mp3_quality: list(128|192|256|320)
  history_limit: int(0,10000)
  overwrite_existing: bool
backup: cold
