name: Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      architectures: ${{ steps.info.outputs.architectures }}
      matrix: ${{ steps.matrix.outputs.matrix }}
      version: ${{ steps.info.outputs.version }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install pyyaml==6.0.2
      - run: python scripts/validate_version.py --tag "${GITHUB_REF_NAME}"
      - id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: ./youtube_audio_downloader
      - id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.06.0
        with:
          architectures: ${{ steps.info.outputs.architectures }}
          image-name: youtube-audio-downloader
          registry-prefix: ghcr.io/misiu

  build:
    needs: prepare
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: home-assistant/builder/actions/build-image@2026.06.0
        with:
          arch: ${{ matrix.arch }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          context: ./youtube_audio_downloader
          image: ${{ matrix.image }}
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            latest
          labels: |
            io.hass.type=app
            io.hass.name=YouTube Audio Downloader
            io.hass.url=https://github.com/Misiu/yt_dlp-addon
          push: true
          version: ${{ needs.prepare.outputs.version }}

  manifest:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    steps:
      - uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.06.0
        with:
          architectures: ${{ needs.prepare.outputs.architectures }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: youtube-audio-downloader
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            latest
          registry-prefix: ghcr.io/misiu

  github-release:
    needs: [prepare, manifest]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7.0.0
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" --verify-tag --title "YouTube Audio Downloader ${{ needs.prepare.outputs.version }}" --notes-file youtube_audio_downloader/CHANGELOG.md
