name: Bug report
description: Report a reproducible App defect (not a security vulnerability)
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include cookies, tokens, private URLs, personal media metadata, or security vulnerabilities.
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: 0.1.0
    validations:
      required: true
  - type: dropdown
    id: architecture
    attributes:
      label: Architecture
      options: [amd64, aarch64]
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Include expected and actual behavior with a public/synthetic example only.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized App logs
      render: text
