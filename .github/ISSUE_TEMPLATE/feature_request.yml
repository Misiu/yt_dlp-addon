name: Feature request
description: Suggest a focused improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: Scope acknowledgement
      options:
        - label: This request does not ask to bypass DRM, authentication, copyright, or source-service restrictions.
          required: true
